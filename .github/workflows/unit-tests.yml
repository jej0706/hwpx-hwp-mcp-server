name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest
    # Force UTF-8 everywhere so Korean strings in tool descriptions,
    # error messages, and print statements don't hit 'charmap' codec
    # failures on the default Windows code page (cp1252 / cp437).
    env:
      PYTHONIOENCODING: "utf-8"
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        shell: bash
        run: pytest tests/unit -v

      - name: Smoke test list_tools (no COM required)
        shell: bash
        run: python tests/smoke/list_tools.py
